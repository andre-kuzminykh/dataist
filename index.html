<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Датаист — Обзор научных статей об ИИ</title>

    <!-- Open Graph -->
    <meta property="og:site_name" content="Датаист" />
    <meta property="og:title" content="Датаист — Обзор научных статей об ИИ" />
    <meta property="og:description" content="Ежедневные обзоры научных статей об искусственном интеллекте, агентах и LLM простым языком." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dataist.ai" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/andre-kuzminykh/dataist/refs/heads/main/favicon.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/andre-kuzminykh/dataist/refs/heads/main/favicon.png">

    <!-- Инициализация темы -->
    <script>
        (function () {
            try {
                var stored = localStorage.getItem('theme');
                var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                var dark = stored ? stored === 'dark' : prefersDark;
                if (dark) document.documentElement.classList.add('dark');
            } catch (e) { document.documentElement.classList.add('dark'); }
        })();
    </script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Шрифты: Inter и Space Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <!-- Иконки Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        apple: {
                            light: '#F5F5F7',
                            dark: '#000000',
                            grayLight: '#E5E5EA',
                            grayDark: '#1C1C1E',
                            textMutedLight: '#86868B',
                            textMutedDark: '#8E8E93',
                        }
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Inter"', 'sans-serif'],
                        mono: ['"Space Mono"', 'monospace']
                    },
                    boxShadow: {
                        'apple': '0 4px 24px rgba(0, 0, 0, 0.04)',
                        'apple-dark': '0 4px 24px rgba(255, 255, 255, 0.04)',
                    }
                }
            }
        };
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .glass-header {
                @apply bg-white/70 dark:bg-black/70 backdrop-blur-2xl border-b border-black/5 dark:border-white/10;
            }
            .glass-panel {
                @apply bg-white dark:bg-[#1C1C1E] border border-black/5 dark:border-white/10 shadow-apple dark:shadow-apple-dark;
            }
        }

        body {
            @apply bg-apple-light dark:bg-apple-dark text-black dark:text-white transition-colors duration-300;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        ::selection {
            @apply bg-black text-white dark:bg-white dark:text-black;
        }

        .slide-content {
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .slide-hidden-left { opacity: 0; transform: translateX(-30px); pointer-events: none; }
        .slide-hidden-right { opacity: 0; transform: translateX(30px); pointer-events: none; }
        .slide-visible { opacity: 1; transform: translateX(0); }

        .nav-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
            pointer-events: none;
        }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { @apply bg-black/10 dark:bg-white/10; border-radius: 4px; }
    </style>
</head>
<body class="font-sans antialiased h-[100dvh] w-screen flex flex-col relative">

    <!-- Хедер -->
    <header class="w-full h-16 md:h-20 z-50 flex justify-between items-center px-4 md:px-8 glass-header transition-colors shrink-0">
        <a href="/" class="flex items-center gap-3 shrink-0 no-underline group">
            <div class="w-6 h-6 md:w-8 md:h-8 rounded-full bg-black dark:bg-white text-white dark:text-black flex items-center justify-center text-xs md:text-sm font-bold font-mono leading-none transition-transform group-hover:scale-105">
                i
            </div>
            <div class="font-sans font-semibold text-lg md:text-xl tracking-tight text-black dark:text-white leading-none mt-[2px]">
                ДАТАИСТ
            </div>
        </a>

        <div class="flex items-center gap-2 md:gap-4 shrink-0">
            <button id="theme-toggle" class="p-2 md:p-2.5 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-all text-black dark:text-white cursor-pointer" title="Сменить тему">
                <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
                <i data-lucide="moon" class="w-5 h-5 block dark:hidden"></i>
            </button>
            <a href="https://t.me/dataism_science" target="_blank" rel="noopener"
               class="flex items-center gap-2 px-4 py-2 md:px-6 md:py-2.5 bg-black dark:bg-white text-white dark:text-black rounded-full transition-all text-[12px] md:text-sm font-sans font-medium hover:scale-105 active:scale-95">
                <i data-lucide="arrow-up-right" class="w-4 h-4"></i>
                <span class="hidden sm:inline">Telegram</span>
            </a>
        </div>
    </header>

    <main class="flex-1 w-full flex flex-col relative px-4 md:px-16 py-4 md:py-8 max-w-7xl mx-auto min-h-0">
        <div class="absolute top-4 md:top-8 left-0 w-full text-center z-0 pointer-events-none select-none">
            <span class="font-mono text-[11px] md:text-xs text-apple-textMutedLight dark:text-apple-textMutedDark opacity-70 font-bold tracking-[0.4em] md:tracking-[0.5em] uppercase">Обзор научных статей</span>
        </div>

        <button disabled class="btn-prev nav-btn hidden md:flex absolute left-2 lg:left-8 top-1/2 -translate-y-1/2 z-40 p-4 rounded-full glass-panel hover:scale-105 transition-all group text-black dark:text-white">
            <i data-lucide="chevron-left" class="w-6 h-6 group-hover:-translate-x-1 transition-transform"></i>
        </button>

        <div class="flex-1 w-full flex flex-col min-h-0 z-10 pt-8 md:pt-0">
            <div id="slide-container" class="m-auto glass-panel w-full max-w-5xl rounded-[2rem] overflow-hidden flex flex-col md:flex-row relative slide-content slide-visible h-auto max-h-full md:max-h-none md:h-[550px] shrink-0">
                <div class="w-full md:w-1/2 h-52 sm:h-64 md:h-full relative overflow-hidden bg-black/5 dark:bg-white/5 shrink-0">
                    <img id="article-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'%3E%3C/svg%3E" alt="Cover" class="absolute inset-0 w-full h-full object-cover object-center transition-transform duration-700 hover:scale-105 opacity-0">
                    <div class="absolute inset-0 flex items-center justify-center" id="img-loader">
                        <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-black/40 dark:text-white/40"></i>
                    </div>
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent z-10 md:hidden"></div>

                    <div class="absolute bottom-4 left-5 z-20 md:hidden">
                        <div id="article-date-mobile" class="px-3 py-1.5 rounded-full bg-black/60 backdrop-blur-md border border-white/10 text-white/90 text-[10px] font-mono font-bold tracking-widest uppercase shadow-lg">
                            --.--.----
                        </div>
                    </div>
                </div>

                <div class="w-full md:w-1/2 p-5 sm:p-6 md:p-10 lg:p-12 flex flex-col overflow-y-auto custom-scroll bg-white dark:bg-[#1C1C1E] relative min-h-[250px] md:min-h-0">
                    <div id="content-loader" class="absolute inset-0 z-20 bg-white dark:bg-[#1C1C1E] flex flex-col items-center justify-center gap-4 transition-opacity duration-300">
                        <i data-lucide="loader-2" class="w-8 h-8 text-black/40 dark:text-white/40 animate-spin"></i>
                        <span class="font-mono text-sm text-apple-textMutedLight dark:text-apple-textMutedDark tracking-widest uppercase">Поиск статьи...</span>
                    </div>

                    <div class="hidden md:inline-flex items-center w-fit gap-2 px-3 py-1.5 mb-4 md:mb-6 rounded-full border border-black/10 dark:border-white/20 bg-black/5 dark:bg-white/5 text-apple-textMutedLight dark:text-apple-textMutedDark text-[10px] md:text-xs font-mono font-bold tracking-[0.1em] uppercase shrink-0">
                        <i data-lucide="calendar" class="w-3.5 h-3.5"></i>
                        <span id="article-date">--.--.----</span>
                    </div>

                    <h1 id="article-title" class="text-2xl sm:text-3xl md:text-[2rem] font-sans font-bold tracking-tight mb-3 md:mb-4 leading-[1.1] text-black dark:text-white shrink-0">
                        Загрузка…
                    </h1>

                    <p id="article-desc" class="font-sans text-sm sm:text-base md:text-lg text-apple-textMutedLight dark:text-apple-textMutedDark leading-relaxed mb-6">
                        Подготовка материалов…
                    </p>

                    <div class="mt-auto pt-4 md:border-t border-black/5 dark:border-white/10 flex items-center justify-end shrink-0">
                        <a id="article-link" href="#" target="_blank" class="w-full md:w-auto inline-flex items-center justify-center gap-2 px-6 py-3.5 md:py-3 bg-black dark:bg-white text-white dark:text-black rounded-full font-semibold font-sans text-sm transition-all hover:scale-105 active:scale-95 pointer-events-none opacity-50">
                            <span>Читать статью</span>
                            <i data-lucide="arrow-up-right" class="w-4 h-4"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <button disabled class="btn-next nav-btn hidden md:flex absolute right-2 lg:right-8 top-1/2 -translate-y-1/2 z-40 p-4 rounded-full glass-panel hover:scale-105 transition-all group text-black dark:text-white">
            <i data-lucide="chevron-right" class="w-6 h-6 group-hover:translate-x-1 transition-transform"></i>
        </button>

        <div class="flex md:hidden w-full justify-between items-center mt-4 z-20 shrink-0">
            <button disabled class="btn-prev nav-btn p-3.5 rounded-full glass-panel active:scale-95 transition-all text-black dark:text-white">
                <i data-lucide="chevron-left" class="w-6 h-6"></i>
            </button>
            <button disabled class="btn-next nav-btn p-3.5 rounded-full glass-panel active:scale-95 transition-all text-black dark:text-white">
                <i data-lucide="chevron-right" class="w-6 h-6"></i>
            </button>
        </div>
    </main>

    <script>
        lucide.createIcons();

        function formatDateStr(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        const monthsRu = ['Января', 'Февраля', 'Марта', 'Апреля', 'Мая', 'Июня', 'Июля', 'Августа', 'Сентября', 'Октября', 'Ноября', 'Декабря'];
        function formatDisplayDate(dateObj) {
            const d = String(dateObj.getDate()).padStart(2, '0');
            const m = monthsRu[dateObj.getMonth()];
            const y = dateObj.getFullYear();
            return `${d} ${m} ${y}`;
        }

        function startOfDay(date) {
            const d = new Date(date);
            d.setHours(0, 0, 0, 0);
            return d;
        }

        const localMocks = {
            "2026-03-03": {
                title: "Context Engineering: новая дисциплина для автономных ИИ-агентов",
                desc: "От README для людей — к документации для машин. Анализ того, как разработчики пишут инструкции для ИИ-агентов в open-source репозиториях.",
                img: "https://i.ibb.co/Csbbn980/Chat-GPT-Image-Mar-3-2026-07-29-15-PM.png"
            },
            "2026-03-02": {
                title: "Reasoning Models: Как модели учатся рассуждать",
                desc: "Глубокий разбор скрытых цепочек рассуждений (Chain of Thought). Как новые архитектуры планируют свои действия перед тем, как дать ответ.",
                img: "https://images.unsplash.com/photo-1620712943543-bcc4688e7485?q=80&w=1200&auto=format&fit=crop"
            }
        };

        const MAX_LOOKBACK_DAYS = 365;
        const NAV_SCAN_DAYS = 30;

        let currentViewDate = startOfDay(new Date());
        let latestAvailableDate = null;
        const articleCache = {};

        const container = document.getElementById('slide-container');
        const elTitle = document.getElementById('article-title');
        const elDesc = document.getElementById('article-desc');
        const elImg = document.getElementById('article-img');
        const elLink = document.getElementById('article-link');
        const elDate = document.getElementById('article-date');
        const elDateMobile = document.getElementById('article-date-mobile');

        const loader = document.getElementById('content-loader');
        const imgLoader = document.getElementById('img-loader');

        const btnsLeft = document.querySelectorAll('.btn-prev');
        const btnsRight = document.querySelectorAll('.btn-next');

        async function fetchArticleData(dateObj) {
            const safeDate = startOfDay(dateObj);
            const dateStr = formatDateStr(safeDate);

            if (articleCache[dateStr]) return articleCache[dateStr];

            const url = `https://dataist.ai/${dateStr}/`;

            try {
                const res = await fetch(url, { method: 'GET' });
                if (!res.ok) throw new Error('Not found');

                const html = await res.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                const getMeta = (prop) => doc.querySelector(`meta[property="${prop}"]`)?.content;

                const data = {
                    title: getMeta('og:title') || doc.title || 'Статья без названия',
                    desc: getMeta('og:description') || 'Описание временно недоступно.',
                    img: getMeta('og:image') || 'https://images.unsplash.com/photo-1620712943543-bcc4688e7485?q=80&w=1200&auto=format&fit=crop',
                    url: url,
                    displayDate: formatDisplayDate(safeDate)
                };

                articleCache[dateStr] = data;
                return data;
            } catch (e) {
                if (localMocks[dateStr]) {
                    const data = {
                        ...localMocks[dateStr],
                        url: url,
                        displayDate: formatDisplayDate(safeDate)
                    };
                    articleCache[dateStr] = data;
                    return data;
                }
                throw new Error('Статья не найдена');
            }
        }

        async function findLatestAvailableArticle() {
            const d = startOfDay(new Date());
            for (let i = 0; i < MAX_LOOKBACK_DAYS; i++) {
                try {
                    const data = await fetchArticleData(d);
                    return { date: new Date(d), data };
                } catch (e) {
                    d.setDate(d.getDate() - 1);
                }
            }
            throw new Error('Последняя статья не найдена');
        }

        async function findAdjacentArticle(fromDate, direction, maxScanDays = NAV_SCAN_DAYS) {
            const targetDate = startOfDay(fromDate);
            for (let i = 0; i < maxScanDays; i++) {
                targetDate.setDate(targetDate.getDate() + (direction === 'newer' ? 1 : -1));
                if (direction === 'newer' && latestAvailableDate && targetDate > latestAvailableDate) break;
                try {
                    const data = await fetchArticleData(targetDate);
                    return { date: new Date(targetDate), data };
                } catch (e) {}
            }
            return null;
        }

        function applyDataToUI(data) {
            if (!data) return;

            elTitle.textContent = data.title;
            elDesc.textContent = data.desc;
            elDate.textContent = data.displayDate;
            elDateMobile.textContent = data.displayDate;

            elLink.href = data.url;
            elLink.classList.remove('pointer-events-none', 'opacity-50');

            imgLoader.style.display = 'flex';
            elImg.classList.add('opacity-0');

            const nextImg = new Image();
            nextImg.onload = () => {
                elImg.src = data.img;
                elImg.classList.remove('opacity-0');
                imgLoader.style.display = 'none';
            };
            nextImg.onerror = () => {
                elImg.src = 'https://images.unsplash.com/photo-1620712943543-bcc4688e7485?q=80&w=1200&auto=format&fit=crop';
                elImg.classList.remove('opacity-0');
                imgLoader.style.display = 'none';
            };
            nextImg.src = data.img;

            loader.style.opacity = '0';
            setTimeout(() => { loader.style.display = 'none'; }, 300);
        }

        function showLoading() {
            loader.style.display = 'flex';
            loader.style.opacity = '1';
            imgLoader.style.display = 'flex';
            elImg.classList.add('opacity-0');
            elLink.classList.add('pointer-events-none', 'opacity-50');
        }

        async function updateButtons() {
            const disableLeft = !latestAvailableDate || currentViewDate >= latestAvailableDate;
            btnsLeft.forEach(btn => btn.disabled = disableLeft);
            const olderResult = await findAdjacentArticle(currentViewDate, 'older', NAV_SCAN_DAYS);
            btnsRight.forEach(btn => btn.disabled = !olderResult);
        }

        async function navigate(directionText) {
            showLoading();
            const result = await findAdjacentArticle(currentViewDate, directionText, NAV_SCAN_DAYS);
            if (result) {
                currentViewDate = new Date(result.date);
                const exitTo = directionText === 'newer' ? 'slide-hidden-right' : 'slide-hidden-left';
                const enterStart = directionText === 'newer' ? 'slide-hidden-left' : 'slide-hidden-right';
                container.classList.remove('slide-visible');
                container.classList.add(exitTo);
                setTimeout(async () => {
                    applyDataToUI(result.data);
                    container.classList.remove('slide-hidden-left', 'slide-hidden-right');
                    container.classList.add(enterStart);
                    void container.offsetWidth;
                    container.classList.remove('slide-hidden-left', 'slide-hidden-right');
                    container.classList.add('slide-visible');
                    await updateButtons();
                }, 400);
            } else {
                const currentData = articleCache[formatDateStr(currentViewDate)];
                if (currentData) applyDataToUI(currentData);
                await updateButtons();
            }
        }

        async function initApp() {
            showLoading();
            try {
                const result = await findLatestAvailableArticle();
                latestAvailableDate = new Date(result.date);
                currentViewDate = new Date(result.date);
                applyDataToUI(result.data);
                await updateButtons();
            } catch (e) {
                elTitle.textContent = "Нет доступных статей";
                elDesc.textContent = "Возможно, сайт только запущен или возникла ошибка сети.";
                elDate.textContent = "--.--.----";
                elDateMobile.textContent = "--.--.----";
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.display = 'none'; }, 300);
                btnsLeft.forEach(btn => btn.disabled = true);
                btnsRight.forEach(btn => btn.disabled = true);
            }
        }

        btnsLeft.forEach(btn => btn.addEventListener('click', () => { if (!btn.disabled) navigate('newer'); }));
        btnsRight.forEach(btn => btn.addEventListener('click', () => { if (!btn.disabled) navigate('older'); }));

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && !btnsLeft[0].disabled) navigate('newer');
            else if (e.key === 'ArrowRight' && !btnsRight[0].disabled) navigate('older');
        });

        let touchStartX = 0;
        let touchEndX = 0;
        container.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
        container.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            const swipeThreshold = 50;
            if (touchEndX < touchStartX - swipeThreshold) { if (!btnsRight[0].disabled) navigate('older'); }
            if (touchEndX > touchStartX + swipeThreshold) { if (!btnsLeft[0].disabled) navigate('newer'); }
        }, {passive: true});

        const themeToggleBtn = document.getElementById('theme-toggle');
        const html = document.documentElement;

        function applyTheme(isDark) {
            if (isDark) { html.classList.add('dark'); localStorage.setItem('theme', 'dark'); }
            else { html.classList.remove('dark'); localStorage.setItem('theme', 'light'); }
            setTimeout(() => lucide.createIcons(), 50);
        }

        themeToggleBtn.addEventListener('click', () => {
            applyTheme(!html.classList.contains('dark'));
        });

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
