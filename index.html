<!DOCTYPE html>
<html lang="ru" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dataism Science Hub - Обзор научных статей об ИИ</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        cyber: {
                            purple: '#a855f7',
                            orange: '#f97316',
                            tg: '#229ED9',
                        }
                    },
                    fontFamily: {
                        mono: ['"Space Mono"', 'monospace'],
                        sans: ['"Inter"', 'sans-serif'],
                        montserrat: ['"Montserrat"', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 6s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>

    <style>
        /* CSS Переменные для Светлой и Темной темы */
        :root {
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #475569;
            --grid-line-p: rgba(168, 85, 247, 0.1);
            --grid-line-o: rgba(249, 115, 22, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(0, 0, 0, 0.05);
            --card-border: rgba(0, 0, 0, 0.05);
            --shadow-glow: rgba(0,0,0,0.02);
            --card-bg: #ffffff;
        }

        .dark {
            --bg-color: #050505;
            --text-main: #e5e7eb;
            --text-muted: #9ca3af;
            --grid-line-p: rgba(168, 85, 247, 0.05);
            --grid-line-o: rgba(249, 115, 22, 0.05);
            --glass-bg: rgba(10, 10, 14, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.1);
            --shadow-glow: rgba(0,0,0,0.5);
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.4s ease, color 0.4s ease;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden; /* Запрещаем скролл body */
        }

        .bg-grid {
            background-size: 40px 40px;
            background-image:
                linear-gradient(to right, var(--grid-line-p) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-line-o) 1px, transparent 1px);
            background-attachment: fixed;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px var(--shadow-glow);
        }

        .text-glow-purple { text-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }
        .text-glow-orange { text-shadow: 0 0 15px rgba(249, 115, 22, 0.4); }

        /* Анимация переключения слайдов */
        .slide-content {
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .slide-hidden-left {
            opacity: 0;
            transform: translateX(-30px);
            pointer-events: none;
        }
        .slide-hidden-right {
            opacity: 0;
            transform: translateX(30px);
            pointer-events: none;
        }
        .slide-visible {
            opacity: 1;
            transform: translateX(0);
        }
        
        .nav-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
            transform: scale(0.95);
        }
        
        /* Кастомный скроллбар для текста на мобилках */
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 4px;
        }
    </style>
</head>
<!-- Заменяем h-screen на h-[100dvh] для корректного отображения в мобильных браузерах -->
<body class="font-sans antialiased h-[100dvh] w-screen bg-grid selection:bg-cyber-purple selection:text-white flex flex-col relative">

    <!-- Фоновые свечения -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[10%] left-[5%] w-[50%] md:w-[30%] h-[50%] bg-cyber-purple/10 dark:bg-cyber-purple/10 rounded-full blur-[120px] animate-pulse-slow"></div>
        <div class="absolute bottom-[10%] right-[5%] w-[50%] md:w-[30%] h-[50%] bg-cyber-orange/10 dark:bg-cyber-orange/10 rounded-full blur-[120px] animate-pulse-slow" style="animation-delay: 3s;"></div>
    </div>

    <!-- Шапка -->
    <header class="w-full h-16 md:h-20 z-50 flex justify-between items-center px-4 md:px-8 border-b border-[var(--glass-border)] bg-[var(--bg-color)]/90 backdrop-blur-md transition-colors duration-400 shrink-0">
        <!-- Логотип и Название -->
        <div class="flex items-center gap-3 md:gap-4">
            <div class="w-6 h-6 md:w-8 md:h-8 rounded-full bg-gray-900 dark:bg-white text-white dark:text-gray-900 flex items-center justify-center text-sm md:text-base font-bold font-mono leading-none transition-colors duration-400 shrink-0">
                i
            </div>
            <div class="font-mono font-black text-lg md:text-2xl tracking-[0.2em] md:tracking-[0.25em] uppercase text-gray-900 dark:text-white leading-none mt-[2px] transition-colors duration-400">
                ДАТАИСТ
            </div>
        </div>
        
        <!-- Органы управления -->
        <div class="flex items-center gap-2 md:gap-4 shrink-0">
            <button id="theme-toggle" class="p-2 md:p-2.5 rounded-lg hover:bg-black/5 dark:hover:bg-white/5 transition-all text-gray-700 dark:text-gray-300 relative cursor-pointer">
                <i data-lucide="sun" class="w-5 h-5 md:w-6 md:h-6 hidden dark:block text-cyber-orange"></i>
                <i data-lucide="moon" class="w-5 h-5 md:w-6 md:h-6 block dark:hidden text-cyber-purple"></i>
            </button>
            <a href="https://t.me/dataism_science" target="_blank" class="flex items-center gap-2 px-3 py-2 md:px-4 md:py-2.5 bg-[#229ED9]/10 hover:bg-[#229ED9]/20 text-[#229ED9] border border-[#229ED9]/30 rounded-lg transition-all text-[11px] md:text-sm font-mono font-bold uppercase tracking-wider shadow-[0_0_10px_rgba(34,158,217,0.2)]">
                <i data-lucide="send" class="w-4 h-4 mt-0.5 rotate-45"></i>
                <span class="hidden sm:inline">Канал</span>
            </a>
        </div>
    </header>

    <!-- Основной блок (Слайдер) -->
    <main class="flex-1 w-full flex flex-col items-center justify-center relative px-4 md:px-16 pt-10 md:pt-12 pb-4 md:pb-6 max-w-7xl mx-auto overflow-hidden">
        
        <!-- Фоновый текст (Заголовок "на заднике") -->
        <div class="absolute top-4 left-0 w-full text-center z-0 pointer-events-none select-none">
            <span class="font-mono text-[11px] md:text-xs text-[var(--text-muted)] opacity-60 font-bold tracking-[0.4em] md:tracking-[0.5em] uppercase">Обзор научных статей</span>
        </div>

        <!-- Кнопка Влево (Десктоп) -->
        <button disabled class="btn-prev nav-btn hidden md:flex absolute left-2 lg:left-8 top-1/2 -translate-y-1/2 z-40 p-4 rounded-full glass-panel hover:border-cyber-purple/50 hover:text-cyber-purple transition-all group">
            <i data-lucide="chevron-left" class="w-6 h-6 group-hover:-translate-x-1 transition-transform"></i>
        </button>

        <!-- Контейнер карточки (Основа) -->
        <!-- min-h-0 позволяет карточке сжиматься на маленьких экранах, не вылезая за рамки viewport -->
        <div id="slide-container" class="glass-panel w-full max-w-5xl rounded-3xl overflow-hidden flex flex-col md:flex-row shadow-2xl relative slide-content slide-visible h-full max-h-[600px] z-10 flex-1 min-h-0">
            
            <!-- Обложка статьи -->
            <div class="w-full md:w-1/2 h-[28%] min-h-[140px] sm:h-56 md:h-full relative overflow-hidden bg-black/5 dark:bg-white/5 shrink-0">
                <img id="article-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'%3E%3C/svg%3E" alt="Cover" class="absolute inset-0 w-full h-full object-cover object-center transition-transform duration-700 hover:scale-105 opacity-0">
                <div class="absolute inset-0 flex items-center justify-center" id="img-loader">
                    <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-cyber-purple"></i>
                </div>
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent z-10 md:hidden"></div>
                
                <!-- Плашка с датой (мобильная) -->
                <div class="absolute bottom-3 left-4 z-20 md:hidden">
                    <div id="article-date-mobile" class="px-3 py-1 rounded-full bg-black/40 backdrop-blur-md border border-white/20 text-white text-[10px] font-mono font-bold tracking-widest uppercase">
                        --.--.----
                    </div>
                </div>
            </div>

            <!-- Контент статьи -->
            <div class="w-full md:w-1/2 p-5 sm:p-6 md:p-10 lg:p-12 flex flex-col flex-1 overflow-hidden bg-[var(--card-bg)] relative min-h-0">
                <!-- Оверлей загрузки -->
                <div id="content-loader" class="absolute inset-0 z-20 bg-[var(--card-bg)] backdrop-blur-md flex flex-col items-center justify-center gap-4 transition-opacity duration-300">
                    <i data-lucide="zap" class="w-8 h-8 text-cyber-orange animate-pulse"></i>
                    <span class="font-mono text-sm text-[var(--text-muted)] tracking-widest uppercase">Поиск статьи...</span>
                </div>

                <!-- Плашка: Дата (десктоп) -->
                <div class="hidden md:inline-flex items-center w-fit gap-2 px-3 py-1.5 mb-4 md:mb-6 rounded-full border border-[var(--glass-border)] text-[var(--text-muted)] text-[10px] md:text-xs font-mono font-bold tracking-[0.1em] uppercase shrink-0">
                    <i data-lucide="calendar" class="w-3.5 h-3.5"></i> 
                    <span id="article-date">--.--.----</span>
                </div>

                <!-- Скроллируемая область для текста (на случай маленьких экранов) -->
                <div class="flex flex-col flex-1 overflow-y-auto custom-scroll pr-2 -mr-2">
                    <h1 id="article-title" class="text-xl sm:text-2xl md:text-3xl font-montserrat font-bold tracking-tight mb-2 sm:mb-3 md:mb-4 leading-tight text-[var(--text-main)] shrink-0">
                        Загрузка...
                    </h1>
                    
                    <p id="article-desc" class="font-sans text-sm sm:text-base text-[var(--text-muted)] leading-relaxed flex-1">
                        Подготовка материалов...
                    </p>
                </div>

                <!-- Кнопка "Читать статью" (всегда прижата к низу) -->
                <div class="mt-4 sm:mt-5 pt-4 border-t border-[var(--glass-border)] flex items-center justify-end shrink-0">
                    <a id="article-link" href="#" target="_blank" class="w-full sm:w-auto inline-flex items-center justify-center gap-2 px-6 py-3 bg-[var(--text-main)] text-[var(--bg-color)] rounded-xl font-bold font-sans text-sm transition-all active:scale-95 shadow-md pointer-events-none opacity-50">
                        <span>Читать статью</span>
                        <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </a>
                </div>
            </div>
        </div>

        <!-- Кнопка Вправо (Десктоп) -->
        <button disabled class="btn-next nav-btn hidden md:flex absolute right-2 lg:right-8 top-1/2 -translate-y-1/2 z-40 p-4 rounded-full glass-panel hover:border-cyber-orange/50 hover:text-cyber-orange transition-all group">
            <i data-lucide="chevron-right" class="w-6 h-6 group-hover:translate-x-1 transition-transform"></i>
        </button>

        <!-- Мобильная навигация (Стрелки снизу) -->
        <div class="flex md:hidden w-full justify-between items-center mt-3 z-20 shrink-0 px-2 sm:px-4">
            <button disabled class="btn-prev nav-btn p-3.5 rounded-full glass-panel hover:border-cyber-purple/50 active:scale-95 transition-all text-[var(--text-main)]">
                <i data-lucide="chevron-left" class="w-6 h-6"></i>
            </button>
            <button disabled class="btn-next nav-btn p-3.5 rounded-full glass-panel hover:border-cyber-orange/50 active:scale-95 transition-all text-[var(--text-main)]">
                <i data-lucide="chevron-right" class="w-6 h-6"></i>
            </button>
        </div>

    </main>

    <script>
        // Инициализация иконок
        lucide.createIcons();

        // --- УТИЛИТЫ ДАТЫ И ФОРМАТИРОВАНИЯ ---
        function formatDateStr(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        const monthsRu = ['Января', 'Февраля', 'Марта', 'Апреля', 'Мая', 'Июня', 'Июля', 'Августа', 'Сентября', 'Октября', 'Ноября', 'Декабря'];
        function formatDisplayDate(dateObj) {
            const d = String(dateObj.getDate()).padStart(2, '0');
            const m = monthsRu[dateObj.getMonth()];
            const y = dateObj.getFullYear();
            return `${d} ${m} ${y}`;
        }

        // --- ФОЛЛБЭК ДЛЯ ПЕСОЧНИЦЫ (Без CORS) ---
        const localMocks = {
            "2026-03-03": {
                title: "Context Engineering: новая дисциплина для автономных ИИ-агентов",
                desc: "От README для людей — к документации для машин. Анализ того, как разработчики пишут инструкции для ИИ-агентов в open-source репозиториях.",
                img: "https://i.ibb.co/Csbbn980/Chat-GPT-Image-Mar-3-2026-07-29-15-PM.png"
            },
            "2026-03-02": {
                title: "Reasoning Models: Как модели учатся рассуждать",
                desc: "Глубокий разбор скрытых цепочек рассуждений (Chain of Thought). Как новые архитектуры планируют свои действия перед тем, как дать ответ.",
                img: "https://images.unsplash.com/photo-1620712943543-bcc4688e7485?q=80&w=1200&auto=format&fit=crop"
            }
        };

        // --- СОСТОЯНИЕ ---
        let currentViewDate = new Date(); 
        let latestAvailableDate = null;   
        const articleCache = {};

        // DOM Элементы
        const container = document.getElementById('slide-container');
        const elTitle = document.getElementById('article-title');
        const elDesc = document.getElementById('article-desc');
        const elImg = document.getElementById('article-img');
        const elLink = document.getElementById('article-link');
        const elDate = document.getElementById('article-date');
        const elDateMobile = document.getElementById('article-date-mobile');
        
        const loader = document.getElementById('content-loader');
        const imgLoader = document.getElementById('img-loader');
        
        // Массивы кнопок (для десктопа и мобилки одновременно)
        const btnsLeft = document.querySelectorAll('.btn-prev'); 
        const btnsRight = document.querySelectorAll('.btn-next');

        // --- ДИНАМИЧЕСКИЙ ФЕТЧИНГ ---
        async function fetchArticleData(dateObj) {
            const dateStr = formatDateStr(dateObj);
            
            if (articleCache[dateStr]) return articleCache[dateStr];

            const url = `https://dataist.ai/${dateStr}/`;
            
            try {
                const res = await fetch(url, { method: 'GET' });
                if (!res.ok) throw new Error('Not found');
                
                const html = await res.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                const getMeta = (prop) => doc.querySelector(`meta[property="${prop}"]`)?.content;
                
                const data = {
                    title: getMeta('og:title') || doc.title || 'Статья без названия',
                    desc: getMeta('og:description') || 'Описание временно недоступно.',
                    img: getMeta('og:image') || 'https://images.unsplash.com/photo-1620712943543-bcc4688e7485?q=80&w=1200&auto=format&fit=crop',
                    url: url,
                    displayDate: formatDisplayDate(dateObj)
                };
                
                articleCache[dateStr] = data;
                return data;

            } catch (e) {
                if (localMocks[dateStr]) {
                    console.log(`Загружена локальная копия для ${dateStr} (Ожидается перенос на основной домен)`);
                    const data = {
                        ...localMocks[dateStr],
                        url: url,
                        displayDate: formatDisplayDate(dateObj)
                    };
                    articleCache[dateStr] = data;
                    return data;
                }
                throw new Error('Статья не найдена');
            }
        }

        // --- ЛОГИКА ОТОБРАЖЕНИЯ ---
        function applyDataToUI(data) {
            elTitle.textContent = data.title;
            elDesc.textContent = data.desc;
            elDate.textContent = data.displayDate;
            elDateMobile.textContent = data.displayDate;
            
            elLink.href = data.url;
            elLink.classList.remove('pointer-events-none', 'opacity-50');

            elImg.onload = () => {
                elImg.classList.remove('opacity-0');
                imgLoader.style.display = 'none';
            };
            elImg.src = data.img;
            
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 300);
        }

        function showLoading() {
            loader.style.display = 'flex';
            imgLoader.style.display = 'flex';
            elImg.classList.add('opacity-0');
            setTimeout(() => loader.style.opacity = '1', 10);
            
            elLink.classList.add('pointer-events-none', 'opacity-50');
        }

        async function updateButtons() {
            // Кнопка Влево (Новее)
            const disableLeft = (latestAvailableDate && currentViewDate >= latestAvailableDate);
            btnsLeft.forEach(btn => btn.disabled = disableLeft);

            // Кнопка Вправо (Старее)
            const prevDay = new Date(currentViewDate);
            prevDay.setDate(prevDay.getDate() - 1);
            
            try {
                await fetchArticleData(prevDay);
                btnsRight.forEach(btn => btn.disabled = false);
            } catch (e) {
                btnsRight.forEach(btn => btn.disabled = true);
            }
        }

        // --- НАВИГАЦИЯ ---
        async function navigate(directionText) {
            const targetDate = new Date(currentViewDate);
            if (directionText === 'newer') {
                targetDate.setDate(targetDate.getDate() + 1);
            } else {
                targetDate.setDate(targetDate.getDate() - 1);
            }

            showLoading();
            
            try {
                const data = await fetchArticleData(targetDate);
                currentViewDate = targetDate;
                
                const enterFrom = directionText === 'newer' ? 'left' : 'right';
                const exitTo = directionText === 'newer' ? 'slide-hidden-right' : 'slide-hidden-left';
                const enterStart = directionText === 'newer' ? 'slide-hidden-left' : 'slide-hidden-right';
                
                container.classList.remove('slide-visible');
                container.classList.add(exitTo);
                
                setTimeout(() => {
                    applyDataToUI(data);
                    
                    container.classList.remove('slide-hidden-left', 'slide-hidden-right');
                    container.classList.add(enterStart);
                    
                    void container.offsetWidth; // Force reflow
                    
                    container.classList.remove('slide-hidden-left', 'slide-hidden-right');
                    container.classList.add('slide-visible');
                    
                    updateButtons();
                }, 400);

            } catch (e) {
                applyDataToUI(articleCache[formatDateStr(currentViewDate)]);
                updateButtons();
            }
        }

        // --- ИНИЦИАЛИЗАЦИЯ ПРИ СТАРТЕ ---
        async function initApp() {
            showLoading();
            let d = new Date(); 
            let found = false;

            for (let i = 0; i < 7; i++) {
                try {
                    const data = await fetchArticleData(d);
                    latestAvailableDate = new Date(d);
                    currentViewDate = new Date(d);
                    applyDataToUI(data);
                    found = true;
                    break;
                } catch (e) {
                    d.setDate(d.getDate() - 1); 
                }
            }

            if (!found) {
                elTitle.textContent = "Нет доступных статей";
                elDesc.textContent = "Возможно, сайт только запущен или возникла ошибка сети.";
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 300);
            } else {
                updateButtons();
            }
        }

        // --- СЛУШАТЕЛИ СОБЫТИЙ ---
        btnsLeft.forEach(btn => btn.addEventListener('click', () => {
            if (!btn.disabled) navigate('newer');
        }));
        
        btnsRight.forEach(btn => btn.addEventListener('click', () => {
            if (!btn.disabled) navigate('older');
        }));

        document.addEventListener('keydown', (e) => {
            // Проверяем состояние кнопок по первой кнопке из массива (мобильной/десктопной)
            if (e.key === 'ArrowLeft' && !btnsLeft[0].disabled) navigate('newer');
            else if (e.key === 'ArrowRight' && !btnsRight[0].disabled) navigate('older');
        });

        // Свайпы на мобильных
        let touchStartX = 0;
        let touchEndX = 0;
        
        container.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});

        container.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            const swipeThreshold = 50;
            if (touchEndX < touchStartX - swipeThreshold) {
                if(!btnsRight[0].disabled) navigate('older');
            }
            if (touchEndX > touchStartX + swipeThreshold) {
                if(!btnsLeft[0].disabled) navigate('newer');
            }
        }, {passive: true});

        // --- ТЕМА (Дарк мод) ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const html = document.documentElement;

        function applyTheme(isDark) {
            if (isDark) html.classList.add('dark');
            else html.classList.remove('dark');
            setTimeout(() => lucide.createIcons(), 50);
        }

        themeToggleBtn.addEventListener('click', () => {
            applyTheme(!html.classList.contains('dark'));
        });

        document.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
</html>
