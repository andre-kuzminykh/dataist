<!DOCTYPE html>
<html lang="ru" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dataism Science Hub - Обзор научных статей об ИИ</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        cyber: {
                            purple: '#a855f7',
                            orange: '#f97316',
                            tg: '#229ED9',
                        }
                    },
                    fontFamily: {
                        mono: ['"Space Mono"', 'monospace'],
                        sans: ['"Inter"', 'sans-serif'],
                        montserrat: ['"Montserrat"', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 6s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>

    <style>
        /* CSS Переменные для Светлой и Темной темы (из вашего кода) */
        :root {
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #475569;
            --grid-line-p: rgba(168, 85, 247, 0.1);
            --grid-line-o: rgba(249, 115, 22, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(0, 0, 0, 0.05);
            --card-border: rgba(0, 0, 0, 0.05);
            --shadow-glow: rgba(0,0,0,0.02);
        }

        .dark {
            --bg-color: #050505;
            --text-main: #e5e7eb;
            --text-muted: #9ca3af;
            --grid-line-p: rgba(168, 85, 247, 0.05);
            --grid-line-o: rgba(249, 115, 22, 0.05);
            --glass-bg: rgba(10, 10, 14, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.1);
            --shadow-glow: rgba(0,0,0,0.5);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.4s ease, color 0.4s ease;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden; /* Запрещаем скролл, так как у нас один экран */
        }

        .bg-grid {
            background-size: 40px 40px;
            background-image:
                linear-gradient(to right, var(--grid-line-p) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-line-o) 1px, transparent 1px);
            background-attachment: fixed;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px var(--shadow-glow);
        }

        .text-glow-purple { text-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }
        .text-glow-orange { text-shadow: 0 0 15px rgba(249, 115, 22, 0.4); }

        /* Анимация переключения слайдов */
        .slide-content {
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .slide-hidden-left {
            opacity: 0;
            transform: translateX(-30px);
            pointer-events: none;
        }
        .slide-hidden-right {
            opacity: 0;
            transform: translateX(30px);
            pointer-events: none;
        }
        .slide-visible {
            opacity: 1;
            transform: translateX(0);
        }
        
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: scale(0.95);
        }
    </style>
</head>
<body class="font-sans antialiased h-screen w-screen bg-grid selection:bg-cyber-purple selection:text-white flex flex-col relative">

    <!-- Фоновые свечения -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[10%] left-[5%] w-[50%] md:w-[30%] h-[50%] bg-cyber-purple/10 dark:bg-cyber-purple/10 rounded-full blur-[120px] animate-pulse-slow"></div>
        <div class="absolute bottom-[10%] right-[5%] w-[50%] md:w-[30%] h-[50%] bg-cyber-orange/10 dark:bg-cyber-orange/10 rounded-full blur-[120px] animate-pulse-slow" style="animation-delay: 3s;"></div>
    </div>

    <!-- Шапка -->
    <header class="w-full h-16 md:h-20 z-50 flex justify-between items-center px-4 md:px-8 border-b border-[var(--glass-border)] bg-[var(--bg-color)]/90 backdrop-blur-md transition-colors duration-400 shrink-0">
        <!-- Логотип и Название -->
        <div class="flex items-center gap-3 md:gap-4">
            <div class="w-6 h-6 md:w-8 md:h-8 rounded-full bg-gray-900 dark:bg-white text-white dark:text-gray-900 flex items-center justify-center text-sm md:text-base font-bold font-mono leading-none transition-colors duration-400 shrink-0">
                i
            </div>
            <div class="font-mono font-black text-lg md:text-2xl tracking-[0.2em] md:tracking-[0.25em] uppercase text-gray-900 dark:text-white leading-none mt-[2px] transition-colors duration-400">
                ДАТАИСТ
            </div>
        </div>
        
        <!-- Органы управления -->
        <div class="flex items-center gap-2 md:gap-4 shrink-0">
            <button id="theme-toggle" class="p-2 md:p-2.5 rounded-lg hover:bg-black/5 dark:hover:bg-white/5 transition-all text-gray-700 dark:text-gray-300 relative cursor-pointer">
                <i data-lucide="sun" class="w-5 h-5 md:w-6 md:h-6 hidden dark:block text-cyber-orange"></i>
                <i data-lucide="moon" class="w-5 h-5 md:w-6 md:h-6 block dark:hidden text-cyber-purple"></i>
            </button>
            <a href="https://t.me/dataism_science" target="_blank" class="flex items-center gap-2 px-3 py-2 md:px-4 md:py-2.5 bg-[#229ED9]/10 hover:bg-[#229ED9]/20 text-[#229ED9] border border-[#229ED9]/30 rounded-lg transition-all text-[11px] md:text-sm font-mono font-bold uppercase tracking-wider shadow-[0_0_10px_rgba(34,158,217,0.2)]">
                <i data-lucide="send" class="w-4 h-4 mt-0.5 rotate-45"></i>
                <span class="hidden sm:inline">Канал</span>
            </a>
        </div>
    </header>

    <!-- Основной блок (Слайдер) -->
    <main class="flex-1 w-full flex items-center justify-center relative px-4 md:px-12 py-6 overflow-hidden">
        
        <!-- Кнопка Влево (Предыдущая - старее) -->
        <button id="btn-prev" class="nav-btn absolute left-2 md:left-8 z-40 p-3 md:p-4 rounded-full glass-panel hover:border-cyber-purple/50 hover:text-cyber-purple transition-all group">
            <i data-lucide="chevron-left" class="w-6 h-6 group-hover:-translate-x-1 transition-transform"></i>
        </button>

        <!-- Контейнер карточки -->
        <div id="slide-container" class="glass-panel w-full max-w-5xl rounded-3xl overflow-hidden flex flex-col md:flex-row shadow-2xl relative slide-content slide-visible h-auto md:h-[550px]">
            
            <!-- Обложка статьи -->
            <div class="w-full md:w-1/2 h-64 md:h-full relative overflow-hidden bg-black/5 dark:bg-white/5 flex-shrink-0">
                <img id="article-img" src="" alt="Cover" class="absolute inset-0 w-full h-full object-cover object-center transition-transform duration-700 hover:scale-105">
                <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent z-10 md:hidden"></div>
                
                <!-- Плашка с датой (мобильная) -->
                <div class="absolute bottom-4 left-4 z-20 md:hidden">
                    <div id="article-date-mobile" class="px-3 py-1 rounded-full bg-black/40 backdrop-blur-md border border-white/20 text-white text-[10px] font-mono font-bold tracking-widest uppercase">
                        --.--.----
                    </div>
                </div>
            </div>

            <!-- Контент статьи -->
            <div class="w-full md:w-1/2 p-6 md:p-10 lg:p-12 flex flex-col h-full overflow-y-auto bg-[var(--card-bg)]">
                <!-- Плашки: Тег и дата -->
                <div class="flex flex-wrap items-center gap-3 mb-6">
                    <div class="inline-flex items-center w-fit px-3 py-1.5 rounded-full border border-cyber-orange/30 bg-cyber-orange/10 text-cyber-orange text-[10px] md:text-xs font-mono font-bold tracking-[0.1em] uppercase">
                        Обзор научных статей
                    </div>
                    <div class="hidden md:inline-flex items-center w-fit gap-2 px-3 py-1.5 rounded-full border border-[var(--glass-border)] text-[var(--text-muted)] text-[10px] md:text-xs font-mono font-bold tracking-[0.1em] uppercase">
                        <i data-lucide="calendar" class="w-3.5 h-3.5"></i> 
                        <span id="article-date">--.--.----</span>
                    </div>
                </div>

                <h1 id="article-title" class="text-2xl md:text-3xl lg:text-4xl font-montserrat font-bold tracking-tight mb-4 leading-tight text-[var(--text-main)]">
                    Загрузка...
                </h1>
                
                <p id="article-desc" class="font-sans text-sm md:text-base text-[var(--text-muted)] line-clamp-4 md:line-clamp-none mb-8 leading-relaxed flex-1">
                    Подготовка материалов...
                </p>

                <div class="mt-auto pt-6 border-t border-[var(--glass-border)] flex items-center justify-end">
                    <a id="article-link" href="#" target="_blank" class="inline-flex items-center gap-2 px-6 py-3 bg-[var(--text-main)] text-[var(--bg-color)] rounded-xl font-bold font-sans text-sm transition-all hover:scale-105 active:scale-95 shadow-md hover:shadow-xl">
                        <span>Читать статью</span>
                        <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </a>
                </div>
            </div>
        </div>

        <!-- Кнопка Вправо (Следующая - новее) -->
        <button id="btn-next" class="nav-btn absolute right-2 md:right-8 z-40 p-3 md:p-4 rounded-full glass-panel hover:border-cyber-orange/50 hover:text-cyber-orange transition-all group">
            <i data-lucide="chevron-right" class="w-6 h-6 group-hover:translate-x-1 transition-transform"></i>
        </button>

    </main>

    <script>
        // Инициализация иконок
        lucide.createIcons();

        // --- БАЗА ДАННЫХ СТАТЕЙ ---
        // Индекс 0 - самая новая (сегодняшняя или последняя добавленная).
        // Чем больше индекс, тем старше статья.
        const articles = [
            {
                date: "2026-03-03",
                displayDate: "03 Марта 2026",
                title: "Context Engineering: новая дисциплина для автономных ИИ-агентов",
                desc: "От README для людей — к документации для машин. Анализ того, как разработчики пишут инструкции для ИИ-агентов в open-source репозиториях.",
                img: "https://i.ibb.co/Csbbn980/Chat-GPT-Image-Mar-3-2026-07-29-15-PM.png",
                url: "http://dataist.ai/2026-03-03/"
            },
            {
                date: "2026-03-02",
                displayDate: "02 Марта 2026",
                title: "Reasoning Models: Как модели учатся рассуждать",
                desc: "Глубокий разбор скрытых цепочек рассуждений (Chain of Thought). Как новые архитектуры планируют свои действия перед тем, как дать ответ.",
                img: "https://images.unsplash.com/photo-1620712943543-bcc4688e7485?q=80&w=1200&auto=format&fit=crop", // placeholder
                url: "http://dataist.ai/2026-03-02/"
            },
            {
                date: "2026-03-01",
                displayDate: "01 Марта 2026",
                title: "RAG vs Long Context: Битва архитектур 2026 года",
                desc: "Что эффективнее: миллионы токенов в контекстном окне или умный векторный поиск? Анализируем затраты, скорость и точность.",
                img: "https://images.unsplash.com/photo-1677442136019-21780ecad995?q=80&w=1200&auto=format&fit=crop", // placeholder
                url: "http://dataist.ai/2026-03-01/"
            }
            // Сюда можно добавлять новые дни
        ];

        // --- ЛОГИКА СЛАЙДЕРА ---
        let currentIndex = 0; // 0 = самая новая статья
        
        const container = document.getElementById('slide-container');
        const elTitle = document.getElementById('article-title');
        const elDesc = document.getElementById('article-desc');
        const elImg = document.getElementById('article-img');
        const elLink = document.getElementById('article-link');
        const elDate = document.getElementById('article-date');
        const elDateMobile = document.getElementById('article-date-mobile');
        
        const btnPrev = document.getElementById('btn-prev'); // старее (индекс ++)
        const btnNext = document.getElementById('btn-next'); // новее (индекс --)

        function initSlider() {
            renderSlide(currentIndex, 'none');
        }

        function renderSlide(index, direction = 'none') {
            const article = articles[index];
            
            // Анимация ухода
            if (direction !== 'none') {
                container.classList.remove('slide-visible');
                container.classList.add(direction === 'left' ? 'slide-hidden-left' : 'slide-hidden-right');
            }

            setTimeout(() => {
                // Подставляем данные
                elTitle.textContent = article.title;
                elDesc.textContent = article.desc;
                elImg.src = article.img;
                elLink.href = article.url;
                elDate.textContent = article.displayDate;
                elDateMobile.textContent = article.displayDate;
                
                // Управляем доступностью кнопок
                // prev значит "в прошлое" (индекс растет)
                btnPrev.disabled = index === articles.length - 1;
                // next значит "в будущее" (индекс падает)
                btnNext.disabled = index === 0;

                // Анимация появления
                if (direction !== 'none') {
                    // Убираем старый класс скрытия
                    container.classList.remove('slide-hidden-left', 'slide-hidden-right');
                    // Добавляем класс скрытия с противоположной стороны для эффекта "выезда"
                    container.classList.add(direction === 'left' ? 'slide-hidden-right' : 'slide-hidden-left');
                    
                    // Форсируем перерисовку (чтобы браузер применил класс до того, как мы добавим visible)
                    void container.offsetWidth; 
                    
                    container.classList.remove('slide-hidden-left', 'slide-hidden-right');
                    container.classList.add('slide-visible');
                }
            }, direction === 'none' ? 0 : 400); // Таймаут равен длительности CSS transition
        }

        // Идем в прошлое (старые статьи)
        btnPrev.addEventListener('click', () => {
            if (currentIndex < articles.length - 1) {
                currentIndex++;
                renderSlide(currentIndex, 'left');
            }
        });

        // Идем в будущее (новые статьи)
        btnNext.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderSlide(currentIndex, 'right');
            }
        });

        // Управление клавиатурой
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && !btnPrev.disabled) {
                currentIndex++;
                renderSlide(currentIndex, 'left');
            } else if (e.key === 'ArrowRight' && !btnNext.disabled) {
                currentIndex--;
                renderSlide(currentIndex, 'right');
            }
        });

        // Свайпы на мобильных
        let touchStartX = 0;
        let touchEndX = 0;
        
        container.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});

        container.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: true});

        function handleSwipe() {
            const swipeThreshold = 50;
            if (touchEndX < touchStartX - swipeThreshold) {
                // Свайп влево (хотим увидеть старую статью)
                if(!btnPrev.disabled) {
                    currentIndex++;
                    renderSlide(currentIndex, 'left');
                }
            }
            if (touchEndX > touchStartX + swipeThreshold) {
                // Свайп вправо (хотим увидеть новую статью)
                if(!btnNext.disabled) {
                    currentIndex--;
                    renderSlide(currentIndex, 'right');
                }
            }
        }

        // --- ЛОГИКА ТЕМЫ (Дарк мод) ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const html = document.documentElement;

        function applyTheme(isDark) {
            if (isDark) {
                html.classList.add('dark');
            } else {
                html.classList.remove('dark');
            }
            setTimeout(() => lucide.createIcons(), 50);
        }

        themeToggleBtn.addEventListener('click', () => {
            const isCurrentlyDark = html.classList.contains('dark');
            applyTheme(!isCurrentlyDark);
        });

        // Запуск
        document.addEventListener('DOMContentLoaded', () => {
            initSlider();
        });

    </script>
</body>
</html>
